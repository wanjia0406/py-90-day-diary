{% extends 'layout.html' %}

{% block content %}
<style>
    /* 匹配示例图的简洁样式 */
    .form-container {
        max-width: 600px;
        margin: 2rem auto;
        padding: 1.5rem;
        border: 1px solid #e5e7eb;
        border-radius: 4px;
    }

    .form-title {
        font-size: 1.2rem;
        font-weight: 600;
        color: #333;
        margin-bottom: 1.5rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid #e5e7eb;
    }

    .form-group {
        margin-bottom: 1rem;
    }

    .form-label {
        font-weight: 600;
        color: #333;
        display: block;
        margin-bottom: 0.3rem;
    }

    .form-control {
        width: 100%;
        padding: 0.5rem;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-weight: 500;
    }

    .submit-btn {
        background-color: #0d6efd;
        color: white;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 4px;
        font-weight: 600;
        cursor: pointer;
    }

    .submit-btn:hover {
        background-color: #0b5ed7;
    }
</style>

<!-- 表单容器：居中+简洁边框 -->
<div class="form-container">
    <!-- 标题：匹配示例图样式 -->
    <div class="form-title">新建部门</div>

    <!-- 表单：纵向单列布局 -->
    <form method="post" id="departmentForm">
        {% csrf_token %}

        <!-- 部门名称输入框 -->
        <div class="form-group">
            <label class="form-label">部门</label>
            <input type="text" class="form-control" id="titleInput" name="title" 
                   value="{{ title|default:'' }}">
        </div>

        <!-- 提交按钮：关键修改 type="button" 并添加 onclick -->
        <button type="button" class="submit-btn" onclick="validateAndSubmit()">提交</button>
    </form>
</div>

<script>
    // 验证并提交表单
    function validateAndSubmit() {
        // 获取输入框的值
        var titleInput = document.getElementById('titleInput');
        var title = titleInput.value.trim();
        
        // 检查是否为空
        if (!title) {
            alert("❌ 部门名称不能为空！");
            titleInput.focus(); // 聚焦到输入框
            return; // 停止执行
        }
        
        // 验证通过，提交表单
        document.getElementById('departmentForm').submit();
    }
    
    // 可选：按回车键也可以提交
    document.getElementById('titleInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault(); // 防止默认提交行为
            validateAndSubmit(); // 调用验证函数
        }
    });
</script>

{% endblock %}
