{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查询网站</title>
    <link rel='stylesheet' href="{% static 'plugins/bootstrap-5.3.8/css/bootstrap.min.css' %}">
    <style>
        /* 自定义导航栏样式，提升视觉效果 */
        .navbar-custom {
            background-color: #2589d1 !important;
        }

        .navbar-custom .nav-link,
        .navbar-custom .navbar-brand {
            color: white !important;
        }

        .navbar-custom .nav-link:hover {
            color: #e0e0e0 !important;
        }

        .navbar-custom .dropdown-menu {
            --bs-dropdown-link-active-bg: #2589d1;
        }

        /* 新增：用户名样式，适配自定义导航栏 */
        .user-name {
            margin-right: 15px;
            color: white !important;
            /* 匹配导航栏文字颜色 */
            align-self: center;
            font-size: 0.95rem;
        }

        /* 响应式适配：小屏幕下自动换行 */
        @media (max-width: 991px) {
            .user-name {
                margin-right: 0;
                margin-bottom: 8px;
            }
        }

        .user-name {
            margin-right: 15px;
            color: white !important;
            /* 匹配导航栏文字颜色 */
            align-self: center;
            font-size: 0.95rem;
            text-decoration: none !important;
            /* 核心：取消下划线 */
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-custom" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="https://getbootstrap.com/docs/">查询网站</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="切换导航">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <!-- 左侧导航菜单 -->
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/depart/list/">部门管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/user/list/">用户管理</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            菜单
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="https://icons.getbootstrap.com/">图标网站</a></li>
                            <li><a class="dropdown-item" href="#">2</a></li>
                            <li><a class="dropdown-item" href="#">3</a></li>
                            <li><a class="dropdown-item" href="#">4</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="#">更多选项</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link disabled" aria-disabled="true">已失效</a>
                    </li>
                </ul>

                <!-- 右侧用户区域：用户名 + 用户菜单（核心修改） -->
                <div class="d-flex align-items-center">
                    <!-- 新增：用户名显示 -->

                    <a class="user-name" href="http://127.0.0.1:8000/depart/list/"
                        style="text-decoration: none !important; /* 核心：取消下划线 */">程fd</a>
                    <!-- 原有：用户菜单 -->
                    <ul class="navbar-nav">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="#" role="button"
                                aria-expanded="false">用户菜单</a>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="#">个人中心</a></li>
                                <li><a class="dropdown-item" href="#">设置</a></li>
                                <li><a class="dropdown-item" href="#">帮助</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item" href="#">退出登录</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container" style="padding: 2rem 0;">
        <div
            style="margin-bottom: 20px; margin-top: 20px; display: flex; justify-content: space-between; align-items: center;">
            <h4 style="margin: 0; color: #2589d1; font-weight: 600;">新建部门</h4>

        </div>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="exampleInputPassword1" class="form-label">部门</label>
                <input type="text" class="form-control" id="text" name="title">
            </div>

            <button type="submit" class="btn btn-primary">提交</button>
        </form>

    </div>





    <script src="{% static 'plugins/bootstrap-5.3.8/js/bootstrap.bundle.min.js' %}"></script>
</body>

</html>
